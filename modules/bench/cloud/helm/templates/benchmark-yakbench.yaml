{{- if eq .Values.benchType "yakbench" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: yakbench
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: xtdb
    app.kubernetes.io/component: benchmark
  annotations:
    {{- if .Values.git.sha }}
    xtdb.com/git-sha: {{ .Values.git.sha | quote }}
    {{- end }}
    {{- if .Values.git.branch }}
    xtdb.com/git-branch: {{ .Values.git.branch | quote }}
    {{- end }}
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- $user := .Values.providerConfig.podLabels | default (dict) -}}
        {{- $base := dict "app.kubernetes.io/name" "xtdb" "app.kubernetes.io/component" "benchmark" -}}
        {{- $labels := merge (dict) $user $base -}}
        {{- toYaml $labels | nindent 8 }}
      annotations:
        "helm.sh/hook": pre-install,pre-upgrade
        "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    spec:
      nodeSelector:
        {{- toYaml .Values.providerConfig.nodeSelector | nindent 8 }}
      serviceAccountName: xtdb-service-account
      restartPolicy: Never
      volumes:
        - name: tmp
          emptyDir: {}
        - name: xtdb-yaml-config
          configMap:
            name: xtdb-yaml-config
        - name: local-disk-cache
          emptyDir:
            sizeLimit: {{ .Values.xtdbConfig.localDiskCache.sizeLimit }}
        - name: crash-logs
          emptyDir: {}
      initContainers:
      - name: wait-for-kafka
        image: busybox
        command: ['sh', '-c', 'until nc -z -w 2 {{ include "xtdb.kafka.host" .Values.xtdbConfig.kafkaBootstrapServers }} {{ include "xtdb.kafka.port" .Values.xtdbConfig.kafkaBootstrapServers }}; do echo waiting for kafka; sleep 5; done;']
        resources:
          requests:
            memory: "256Mi"
          limits:
            memory: "256Mi"
      containers:
        - name: xtdb-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Upload crash artifacts to Azure Blob Storage before pod termination
                    if command -v az >/dev/null 2>&1; then
                      CRASH_DIRS="/var/crash-logs /opt/xtdb/crashes"
                      POD_NAME="${XTDB_NODE_ID:-unknown}"
                      TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                      UPLOAD_PATH="crash-artifacts/${POD_NAME}-${TIMESTAMP}"

                      for dir in $CRASH_DIRS; do
                        if [ -d "$dir" ] && [ "$(ls -A $dir 2>/dev/null)" ]; then
                          echo "Uploading crash artifacts from $dir to Azure Blob Storage..."
                          az storage blob upload-batch \
                            --account-name "${AZURE_STORAGE_ACCOUNT}" \
                            --destination "${AZURE_STORAGE_CONTAINER}" \
                            --destination-path "${UPLOAD_PATH}/$(basename $dir)" \
                            --source "$dir" \
                            --auth-mode login \
                            --overwrite true || echo "Failed to upload from $dir"
                        fi
                      done
                    fi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - mountPath: /var/lib/xtdb-config/xtdbconfig.yaml
              name: xtdb-yaml-config
              subPath: xtdbconfig.yaml
            - name: local-disk-cache
              mountPath: /var/lib/xtdb/buffers/
            - name: crash-logs
              mountPath: /var/crash-logs
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: xtdb-env-config
            {{- if .Values.providerConfig.existingSecret }}
            - secretRef:
                name: {{ .Values.providerConfig.existingSecret }}
            {{- end }}
          env:
            - name: XTDB_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.git.sha }}
            - name: GIT_SHA
              value: {{ .Values.git.sha | quote }}
            {{- end }}
            {{- if .Values.git.branch }}
            - name: GIT_BRANCH
              value: {{ .Values.git.branch | quote }}
            {{- end }}
            - name: GITHUB_REPOSITORY
              value: {{ .Values.git.repo | default "xtdb/xtdb" | quote }}
            - name: GITHUB_RUN_ID
              value: {{ .Values.git.runId | default "" | quote }}
          args:
            - yakbench
            - -f
            - "/var/lib/xtdb-config/xtdbconfig.yaml"
            - --scale-factor
            - {{ .Values.yakbench.scaleFactor | quote }}
          ports:
            - name: metrics
              containerPort: 8080
{{- end }}
